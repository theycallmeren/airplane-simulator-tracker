<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tar Skylink Empire Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#050816;
    color:white;
    font-family:Arial, sans-serif;
}

.card{
    background:#111827;
    border:1px solid #1f2937;
    border-radius:24px;
}

button{
    transition:0.2s;
}

button:hover{
    transform:scale(1.03);
}

canvas{
    background:#0b1220;
    border-radius:20px;
    padding:10px;
}
</style>
</head>

<body>

<div class="max-w-7xl mx-auto p-6">

    <div class="text-center mb-10">
        <h1 class="text-6xl font-black text-red-500 mb-3">
            TAR SKYLINK
        </h1>

        <p class="text-zinc-400 text-xl">
            Airplane Simulator Empire Tracker
        </p>

        <p class="text-zinc-500 mt-3">
            Created by Ren (@they_call_me_ren)
        </p>
    </div>

    <div class="grid md:grid-cols-4 gap-4 mb-8">

        <div class="card p-6">
            <p class="text-zinc-400 mb-2">Current Cash</p>
            <h2 id="cashDisplay" class="text-4xl font-black text-green-400">
                $0
            </h2>
        </div>

        <div class="card p-6">
            <p class="text-zinc-400 mb-2">Total EXP</p>
            <h2 id="expDisplay" class="text-4xl font-black text-pink-400">
                0
            </h2>
        </div>

        <div class="card p-6">
            <p class="text-zinc-400 mb-2">Cash / Hour</p>
            <h2 id="cashHourDisplay" class="text-4xl font-black text-cyan-400">
                $0
            </h2>
        </div>

        <div class="card p-6">
            <p class="text-zinc-400 mb-2">Time Until 1B</p>
            <h2 id="timeTo1B" class="text-4xl font-black text-yellow-400">
                --
            </h2>
        </div>

    </div>

    <div class="grid lg:grid-cols-2 gap-8 mb-10">

        <div class="card p-8">

            <h2 class="text-3xl font-black mb-6 text-red-400">
                Add Contract
            </h2>

            <div class="space-y-5">

                <div>
                    <p class="mb-2 text-zinc-400">
                        Contract Type
                    </p>

                    <select id="contractType"
                        class="w-full bg-black border border-zinc-700 rounded-2xl p-4">

                        <option>Passenger</option>
                        <option>Cargo</option>
                        <option>Special Cargo</option>
                        <option>Celebrity</option>
                        <option>Presidential</option>

                    </select>
                </div>

                <div>
                    <p class="mb-2 text-zinc-400">
                        Aircraft
                    </p>

                    <input id="aircraft"
                        type="text"
                        placeholder="X-15 / VSS Unity"
                        class="w-full bg-black border border-zinc-700 rounded-2xl p-4">
                </div>

                <div>
                    <p class="mb-2 text-zinc-400">
                        Payout
                    </p>

                    <input id="payout"
                        type="number"
                        placeholder="45000"
                        class="w-full bg-black border border-zinc-700 rounded-2xl p-4">
                </div>

                <div>
                    <p class="mb-2 text-zinc-400">
                        Minutes Taken
                    </p>

                    <input id="minutes"
                        type="number"
                        placeholder="2"
                        class="w-full bg-black border border-zinc-700 rounded-2xl p-4">
                </div>

                <button onclick="addContract()"
                    class="w-full bg-red-600 hover:bg-red-500 rounded-2xl py-5 text-2xl font-black">
                    Add Contract
                </button>

            </div>

        </div>

        <div class="card p-8">

            <h2 class="text-3xl font-black mb-6 text-cyan-400">
                Contract Stopwatch
            </h2>

            <div class="text-center">

                <h1 id="timer"
                    class="text-6xl font-black mb-8">
                    00:00:00
                </h1>

                <div class="grid grid-cols-2 gap-4">

                    <button onclick="toggleTimer()"
                        class="bg-green-600 rounded-2xl py-4 text-xl font-black">
                        Start / Pause
                    </button>

                    <button onclick="resetTimer()"
                        class="bg-red-600 rounded-2xl py-4 text-xl font-black">
                        Reset
                    </button>

                </div>

            </div>

        </div>

    </div>

    <div class="card p-8 mb-10">

        <h2 class="text-3xl font-black mb-6 text-yellow-400">
            Payout Performance Graph
        </h2>

        <canvas id="graph"></canvas>

    </div>

    <div class="card p-8">

        <div class="flex justify-between items-center mb-6">

            <h2 class="text-3xl font-black text-green-400">
                Contract History
            </h2>

            <div class="flex gap-3">

                <button onclick="exportSave()"
                    class="bg-blue-600 px-5 py-3 rounded-2xl font-black">
                    Export
                </button>

                <label class="bg-purple-600 px-5 py-3 rounded-2xl font-black cursor-pointer">
                    Import
                    <input type="file"
                        onchange="importSave(event)"
                        hidden>
                </label>

            </div>

        </div>

        <div id="history" class="space-y-4"></div>

    </div>

</div>

<script>

let currentCash =
    Number(localStorage.getItem("cash")) || 0

let totalEXP =
    Number(localStorage.getItem("exp")) || 0

let totalMinutes =
    Number(localStorage.getItem("minutes")) || 0

let history =
    JSON.parse(localStorage.getItem("history")) || []

let graphValues =
    JSON.parse(localStorage.getItem("graph")) || []

let timerSeconds =
    Number(localStorage.getItem("timer")) || 0

let timerRunning = false

const ctx =
    document.getElementById("graph")

let chart = new Chart(ctx,{
    type:"line",
    data:{
        labels:[],
        datasets:[{
            label:"Contract Payout",
            data:[],
            borderWidth:4,
            tension:0.3
        }]
    },
    options:{
        plugins:{
            legend:{
                labels:{
                    color:"white"
                }
            }
        },
        scales:{
            x:{
                ticks:{color:"white"}
            },
            y:{
                ticks:{color:"white"}
            }
        }
    }
})

function saveData(){

    localStorage.setItem("cash", currentCash)
    localStorage.setItem("exp", totalEXP)
    localStorage.setItem("minutes", totalMinutes)
    localStorage.setItem("history", JSON.stringify(history))
    localStorage.setItem("graph", JSON.stringify(graphValues))
    localStorage.setItem("timer", timerSeconds)

}

function updateUI(){

    document.getElementById("cashDisplay")
    .innerText =
        "$" + currentCash.toLocaleString()

    document.getElementById("expDisplay")
    .innerText =
        totalEXP.toLocaleString()

    const cashPerHour =
        totalMinutes > 0
        ? Math.round(
            currentCash /
            (totalMinutes / 60)
          )
        : 0

    document.getElementById("cashHourDisplay")
    .innerText =
        "$" + cashPerHour.toLocaleString()

    const target = 1000000000
    const remaining = target - currentCash

    const hours =
        cashPerHour > 0
        ? Math.ceil(remaining / cashPerHour)
        : 0

    document.getElementById("timeTo1B")
    .innerText =
        hours > 0
        ? hours + "h"
        : "--"

    const historyDiv =
        document.getElementById("history")

    historyDiv.innerHTML = ""

    history.slice().reverse().forEach(item=>{

        historyDiv.innerHTML += `
        <div class="bg-black rounded-2xl p-5 border border-zinc-800">
            <div class="flex justify-between">
                <div>
                    <h3 class="text-2xl font-black text-red-400">
                        ${item.type}
                    </h3>

                    <p class="text-zinc-400">
                        ${item.aircraft}
                    </p>
                </div>

                <div class="text-right">
                    <h3 class="text-2xl font-black text-green-400">
                        $${item.payout.toLocaleString()}
                    </h3>

                    <p class="text-zinc-400">
                        ${item.minutes} mins
                    </p>
                </div>
            </div>
        </div>
        `

    })

    chart.data.labels =
        graphValues.map((_,i)=>i+1)

    chart.data.datasets[0].data =
        graphValues

    chart.update()

    saveData()

}

function addContract(){

    const type =
        document.getElementById("contractType").value

    const aircraft =
        document.getElementById("aircraft").value

    const payout =
        Number(
            document.getElementById("payout").value
        )

    const minutes =
        Number(
            document.getElementById("minutes").value
        )

    if(!payout || !minutes) return

    currentCash += payout
    totalEXP += 1000
    totalMinutes += minutes

    graphValues.push(payout)

    history.push({
        type,
        aircraft,
        payout,
        minutes
    })

    updateUI()

}

function exportSave(){

    const data = {
        currentCash,
        totalEXP,
        totalMinutes,
        history,
        graphValues
    }

    const blob =
        new Blob(
            [JSON.stringify(data)],
            {type:"application/json"}
        )

    const a =
        document.createElement("a")

    a.href =
        URL.createObjectURL(blob)

    a.download =
        "tar-skylink-save.json"

    a.click()

}

function importSave(event){

    const file =
        event.target.files[0]

    if(!file) return

    const reader =
        new FileReader()

    reader.onload = function(e){

        const data =
            JSON.parse(e.target.result)

        currentCash =
            data.currentCash || 0

        totalEXP =
            data.totalEXP || 0

        totalMinutes =
            data.totalMinutes || 0

        history =
            data.history || []

        graphValues =
            data.graphValues || []

        updateUI()

    }

    reader.readAsText(file)

}

function updateTimer(){

    const h =
        String(
            Math.floor(timerSeconds/3600)
        ).padStart(2,"0")

    const m =
        String(
            Math.floor((timerSeconds%3600)/60)
        ).padStart(2,"0")

    const s =
        String(
            timerSeconds%60
        ).padStart(2,"0")

    document.getElementById("timer")
    .innerText =
        `${h}:${m}:${s}`

}

function toggleTimer(){

    timerRunning = !timerRunning

}

function resetTimer(){

    timerSeconds = 0
    updateTimer()
    saveData()

}

setInterval(()=>{

    if(timerRunning){

        timerSeconds++

        updateTimer()

        saveData()

    }

},1000)

updateTimer()
updateUI()

</script>

</body>
</html>
